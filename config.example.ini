[whisper]
# Model size: tiny.en, base.en, small.en, medium.en, large-v3
model = base.en

# Device: cpu or cuda (cuda requires cuDNN)
device = cpu

# Compute type: int8 for CPU, float16 for GPU
compute_type = int8

[hotkey]
# Key combo to hold for recording. Use + to combine modifiers with a trigger key.
# Examples: ctrl+shift+space, f12, scroll_lock, alt+r
key = ctrl+shift+space

[behavior]
# Type text into active input field
auto_type = true

# Also copy transcribed text to clipboard
copy_to_clipboard = false

# Show desktop notification
notifications = true
